<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Cyber Sentinels (KEC)</title>
    <style>
        /* ============================================
           RESET & BASE STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================
           NAVBAR
           ============================================ */
        .navbar {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid #00ff41;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: bold;
            color: #00ff41;
            letter-spacing: 1px;
        }

        .navbar-menu {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .navbar-menu a {
            color: #e0e0e0;
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
        }

        .navbar-menu a:hover {
            color: #00ff41;
        }

        /* ============================================
           CONTAINER
           ============================================ */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* ============================================
           PAGE HEADER
           ============================================ */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header h1 {
            font-size: 48px;
            color: #00ff41;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .page-header p {
            font-size: 16px;
            color: #00d9ff;
        }

        /* ============================================
           EVENTS GRID
           ============================================ */
        .events-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* ============================================
           EVENT CARD
           ============================================ */
        .event-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 8px;
            padding: 25px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 255, 65, 0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .event-card:hover {
            border-color: #00ff41;
            box-shadow: 0 8px 32px rgba(0, 255, 65, 0.3);
            transform: translateY(-5px);
        }

        .event-card-header {
            margin-bottom: 15px;
        }

        .event-card-title {
            font-size: 22px;
            color: #00ff41;
            font-weight: bold;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .event-card-date {
            color: #00d9ff;
            font-size: 13px;
            font-weight: 500;
        }

        .event-card-body {
            flex-grow: 1;
            margin-bottom: 15px;
        }

        .event-card-description {
            color: #b0b0b0;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }

        .event-card-footer {
            padding-top: 15px;
            border-top: 1px solid rgba(0, 255, 65, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .event-time {
            color: #00d9ff;
        }

        /* ============================================
           LOADING & MESSAGES
           ============================================ */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #00d9ff;
            font-size: 18px;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 65, 0.3);
            border-top-color: #00ff41;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #00d9ff;
        }

        .empty-state h2 {
            font-size: 28px;
            color: #00ff41;
            margin-bottom: 15px;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #00ff41;
            color: #000;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background-color: #00cc33;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
            transform: translateY(-2px);
        }

        /* ============================================
           FILTERS
           ============================================ */
        .filters-section {
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            animation: slideDown 0.6s ease-out;
        }

        .filter-button {
            padding: 10px 20px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid rgba(0, 255, 65, 0.3);
            color: #00ff41;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .filter-button:hover,
        .filter-button.active {
            background-color: #00ff41;
            color: #000;
            border-color: #00ff41;
        }

        /* ============================================
           RESPONSIVE DESIGN
           ============================================ */
        @media (max-width: 768px) {
            .events-container {
                grid-template-columns: 1fr;
            }

            .page-header h1 {
                font-size: 32px;
            }

            .navbar {
                flex-direction: column;
                gap: 15px;
            }

            .navbar-menu {
                flex-direction: column;
                gap: 15px;
                width: 100%;
            }

            .navbar-menu a {
                display: block;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px 10px;
            }

            .event-card {
                padding: 15px;
            }

            .page-header h1 {
                font-size: 24px;
            }

            .navbar-brand {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">⚔️ CYBER SENTINELS</div>
        <div class="navbar-menu">
            <a href="home.html">Home</a>
            <a href="team.html">Team</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <h1>📅 Security Events</h1>
            <p>Latest updates and announcements from Cyber Sentinels</p>
        </div>

        <!-- Filters -->
        <div class="filters-section">
            <button class="filter-button active" data-filter="all">All Events</button>
            <button class="filter-button" data-filter="recent">Most Recent</button>
            <button class="filter-button" data-filter="oldest">Oldest First</button>
        </div>

        <!-- Events Container -->
        <div class="events-container" id="events-container">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading events...</p>
            </div>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        /* ============================================
           SUPABASE INITIALIZATION
           ============================================ */
        const supabaseUrl = 'https://wqltbuvcrvvpvukzkvdc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxbHRidXZjcnZ2cHZ1a3prdmRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzk4NDk3NzMsImV4cCI6MjA1NTQyNTc3M30.lJq3-eKjM4i7lKvTMH6fMNpvPRPYKL3mVq0wVq5PYMU';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        /* ============================================
           STATE MANAGEMENT
           ============================================ */
        let allEvents = [];
        let currentFilter = 'all';

        /* ============================================
           UTILITY FUNCTIONS
           ============================================ */

        /**
         * Format date to readable string
         */
        function formatDate(dateString) {
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }

        /**
         * Format time only
         */
        function formatTime(dateString) {
            const options = { 
                hour: '2-digit',
                minute: '2-digit'
            };
            return new Date(dateString).toLocaleTimeString('en-US', options);
        }

        /**
         * Get days ago text
         */
        function getDaysAgoText(dateString) {
            const eventDate = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - eventDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;
            if (diffDays < 30) return `${Math.floor(diffDays / 7)} weeks ago`;
            return `${Math.floor(diffDays / 30)} months ago`;
        }

        /* ============================================
           EVENT RENDERING
           ============================================ */

        /**
         * Create event card HTML
         */
        function createEventCard(event) {
            return `
                <div class="event-card">
                    <div class="event-card-header">
                        <div class="event-card-title">${escapeHtml(event.title)}</div>
                        <div class="event-card-date">${formatDate(event.date)}</div>
                    </div>
                    <div class="event-card-body">
                        <p class="event-card-description">${escapeHtml(event.description)}</p>
                    </div>
                    <div class="event-card-footer">
                        <span class="event-time">${getDaysAgoText(event.date)}</span>
                    </div>
                </div>
            `;
        }

        /**
         * Escape HTML to prevent XSS
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /**
         * Render events based on current filter
         */
        function renderEvents() {
            const container = document.getElementById('events-container');

            if (allEvents.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1;">
                        <div class="empty-state">
                            <h2>No Events Yet</h2>
                            <p>Check back soon for the latest security updates and announcements!</p>
                            <a href="home.html" class="back-btn">Back to Home</a>
                        </div>
                    </div>
                `;
                return;
            }

            let eventsToDisplay = [...allEvents];

            if (currentFilter === 'oldest') {
                eventsToDisplay.reverse();
            }

            container.innerHTML = eventsToDisplay
                .map(event => createEventCard(event))
                .join('');
        }

        /* ============================================
           DATA LOADING
           ============================================ */

        /**
         * Load events from Supabase with timeout
         */
        async function loadEvents() {
            try {
                console.log('Starting to load events...');
                
                // Create a timeout promise
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('Request timeout - Supabase database may be unavailable')), 8000)
                );

                // Race between timeout and actual request
                const { data, error } = await Promise.race([
                    supabase
                        .from('events')
                        .select('*')
                        .order('created_at', { ascending: false }),
                    timeoutPromise
                ]);

                console.log('Supabase response:', { data, error });

                if (error) {
                    console.error('Error loading events:', error);
                    
                    // If table doesn't exist or timeout, show demo data
                    if (error.message.includes('relation') || 
                        error.message.includes('does not exist') || 
                        error.code === 'PGRST116' ||
                        error.message.includes('timeout')) {
                        // Use demo data instead
                        console.log('Using demo data');
                        allEvents = [
                            {
                                id: 1,
                                title: 'Welcome to Cyber Sentinels Events',
                                description: 'This is the events page. Events posted from the dashboard will appear here automatically.',
                                date: new Date().toISOString(),
                                created_at: new Date().toISOString()
                            },
                            {
                                id: 2,
                                title: 'Events Table Setup Required',
                                description: 'To store real events, please create an "events" table in Supabase with columns: id, title, description, date, created_at',
                                date: new Date(Date.now() - 86400000).toISOString(),
                                created_at: new Date(Date.now() - 86400000).toISOString()
                            }
                        ];
                        renderEvents();
                    } else {
                        document.getElementById('events-container').innerHTML = `
                            <div style="grid-column: 1 / -1;">
                                <div class="empty-state">
                                    <h2>Error Loading Events</h2>
                                    <p><strong>Error:</strong> ${error.message}</p>
                                    <a href="home.html" class="back-btn">Back to Home</a>
                                </div>
                            </div>
                        `;
                    }
                    return;
                }

                console.log('Events loaded successfully:', data);
                
                allEvents = data || [];
                renderEvents();
            } catch (error) {
                console.error('Unexpected error:', error);
                
                // Show demo data on any error
                console.log('Showing demo data due to error');
                allEvents = [
                    {
                        id: 1,
                        title: 'Welcome to Cyber Sentinels Events',
                        description: 'This is the events page. Events posted from the dashboard will appear here automatically.',
                        date: new Date().toISOString(),
                        created_at: new Date().toISOString()
                    },
                    {
                        id: 2,
                        title: 'Events Table Setup Required',
                        description: 'To store real events, please create an "events" table in Supabase with columns: id, title, description, date, created_at',
                        date: new Date(Date.now() - 86400000).toISOString(),
                        created_at: new Date(Date.now() - 86400000).toISOString()
                    }
                ];
                renderEvents();
            }
        }

        /* ============================================
           EVENT LISTENERS
           ============================================ */

        /**
         * Filter button click handler
         */
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Page loaded, initializing events...');
            console.log('Supabase URL:', supabaseUrl);
            
            // Load events
            loadEvents();

            // Filter button listeners
            document.querySelectorAll('.filter-button').forEach(button => {
                button.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-button').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.filter;
                    renderEvents();
                });
            });
        });
    </script>
</body>
</html>

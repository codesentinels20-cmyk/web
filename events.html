<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Cyber Sentinels (KEC)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        nav {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid #00ff41;
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-size: 24px;
            font-weight: bold;
            color: #00ff41;
            letter-spacing: 1px;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-menu a {
            color: #e0e0e0;
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
        }

        .nav-menu a:hover {
            color: #00ff41;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-header h1 {
            font-size: 48px;
            color: #00ff41;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .page-header p {
            font-size: 16px;
            color: #00d9ff;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 8px;
            padding: 25px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 255, 65, 0.1);
            transition: all 0.3s ease;
        }

        .event-card:hover {
            border-color: #00ff41;
            box-shadow: 0 8px 32px rgba(0, 255, 65, 0.3);
            transform: translateY(-5px);
        }

        .event-title {
            font-size: 22px;
            color: #00ff41;
            font-weight: bold;
            margin-bottom: 12px;
            word-break: break-word;
        }

        .event-date {
            color: #00d9ff;
            font-size: 13px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .event-description {
            color: #b0b0b0;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #00d9ff;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 65, 0.3);
            border-top-color: #00ff41;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #00d9ff;
        }

        .empty-state h2 {
            font-size: 28px;
            color: #00ff41;
            margin-bottom: 15px;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #00ff41;
            color: #000;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background-color: #00cc33;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .events-grid {
                grid-template-columns: 1fr;
            }

            .page-header h1 {
                font-size: 32px;
            }

            .nav-menu {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-brand">⚔️ CYBER SENTINELS</div>
            <ul class="nav-menu">
                <li><a href="home.html">Home</a></li>
                <li><a href="team.html">Team</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📅 Security Events</h1>
            <p>Latest updates and announcements from Cyber Sentinels</p>
        </div>

        <div id="content" class="events-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading events...</p>
            </div>
        </div>
    </div>

    <script>
        function formatDate(dateString) {
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }

        function createEventCard(event) {
            return `
                <div class="event-card">
                    <div class="event-title">${escapeHtml(event.title)}</div>
                    <div class="event-date">${formatDate(event.date)}</div>
                    <div class="event-description">${escapeHtml(event.description)}</div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function loadEvents() {
            try {
                console.log('Loading events from localStorage...');
                
                const events = JSON.parse(localStorage.getItem('cybersecurity_events')) || [];
                console.log('Events found:', events.length);

                const content = document.getElementById('content');

                if (!events || events.length === 0) {
                    console.log('No events in storage');
                    content.innerHTML = `
                        <div style="grid-column: 1 / -1;">
                            <div class="empty-state">
                                <h2>No Events Yet</h2>
                                <p>Events posted from the dashboard will appear here</p>
                                <a href="dashboard.html" class="back-btn">Go to Dashboard</a>
                            </div>
                        </div>
                    `;
                    return;
                }

                content.innerHTML = events.map(event => createEventCard(event)).join('');

            } catch (error) {
                console.error('Error loading events:', error);
                const content = document.getElementById('content');
                content.innerHTML = `
                    <div style="grid-column: 1 / -1;">
                        <div class="empty-state">
                            <h2>Error Loading Events</h2>
                            <p>${error.message}</p>
                            <a href="home.html" class="back-btn">Back to Home</a>
                        </div>
                    </div>
                `;
            }
        }

        window.addEventListener('load', loadEvents);
    </script>
</body>
</html>

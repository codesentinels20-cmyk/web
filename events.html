<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Cyber Sentinels (KEC)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        nav {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid #00ff41;
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-size: 24px;
            font-weight: bold;
            color: #00ff41;
            letter-spacing: 1px;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-menu a {
            color: #e0e0e0;
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
        }

        .nav-menu a:hover {
            color: #00ff41;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-header h1 {
            font-size: 48px;
            color: #00ff41;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .page-header p {
            font-size: 16px;
            color: #00d9ff;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 8px;
            padding: 25px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 255, 65, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .event-card:hover {
            border-color: #00ff41;
            box-shadow: 0 8px 32px rgba(0, 255, 65, 0.3);
            transform: translateY(-5px);
        }

        .event-title {
            font-size: 22px;
            color: #00ff41;
            font-weight: bold;
            margin-bottom: 12px;
            word-break: break-word;
        }

        .event-date {
            color: #00d9ff;
            font-size: 13px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .event-description {
            color: #b0b0b0;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #00d9ff;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 65, 0.3);
            border-top-color: #00ff41;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #00d9ff;
        }

        .empty-state h2 {
            font-size: 28px;
            color: #00ff41;
            margin-bottom: 15px;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #00ff41;
            color: #000;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background-color: #00cc33;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
            transform: translateY(-2px);
        }

        /* ============================================
           MODAL STYLES
           ============================================ */
        .event-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .event-modal.open {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .event-modal-content {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            border: 2px solid #00ff41;
            border-radius: 8px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .event-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            border-bottom: 2px solid #00ff41;
            padding-bottom: 15px;
        }

        .event-modal-header h2 {
            color: #00ff41;
            margin: 0;
            font-size: 28px;
            flex: 1;
            word-break: break-word;
        }

        .event-modal-close {
            background: none;
            border: none;
            color: #00ff41;
            font-size: 32px;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }

        .event-modal-close:hover {
            color: #00d9ff;
        }

        .event-modal-photo {
            width: 100%;
            border-radius: 4px;
            max-height: 400px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .event-modal-date {
            color: #00d9ff;
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .event-modal-description {
            color: #b0b0b0;
            font-size: 15px;
            line-height: 1.8;
            word-break: break-word;
            white-space: pre-wrap;
        }

        /* ============================================
           SCROLLBAR STYLING
           ============================================ */
        .event-modal-content::-webkit-scrollbar {
            width: 6px;
        }

        .event-modal-content::-webkit-scrollbar-track {
            background: rgba(0, 255, 65, 0.1);
            border-radius: 3px;
        }

        .event-modal-content::-webkit-scrollbar-thumb {
            background: #00ff41;
            border-radius: 3px;
        }

        .event-modal-content::-webkit-scrollbar-thumb:hover {
            background: #00cc33;
        }

        @media (max-width: 768px) {
            .events-grid {
                grid-template-columns: 1fr;
            }

            .page-header h1 {
                font-size: 32px;
            }

            .nav-menu {
                gap: 15px;
            }

            .event-modal-content {
                padding: 20px;
            }

            .event-modal-header h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-brand">⚔️ CYBER SENTINELS</div>
            <ul class="nav-menu">
                <li><a href="home.html">Home</a></li>
                <li><a href="team.html">Team</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📅 Security Events</h1>
            <p>Latest updates and announcements from Cyber Sentinels</p>
        </div>

        <div id="content" class="events-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading events...</p>
            </div>
        </div>
    </div>

    <!-- Event Detail Modal -->
    <div id="eventModal" class="event-modal">
        <div class="event-modal-content">
            <div class="event-modal-header">
                <h2 id="modalEventTitle">Event Title</h2>
                <button class="event-modal-close" onclick="closeEventModal()">&times;</button>
            </div>
            <img id="modalEventPhoto" class="event-modal-photo" style="display: none;">
            <div class="event-modal-date" id="modalEventDate">Date</div>
            <div class="event-modal-description" id="modalEventDescription">Description</div>
        </div>
    </div>

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Supabase Credentials & Client -->
    <script src="credentials.js"></script>

    <script>
        function formatDate(dateString) {
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }

        let allEvents = [];

        function createEventCard(event) {
            let photoHtml = '';
            if (event.photo_url) {
                photoHtml = `<img src="${event.photo_url}" style="width: 100%; border-radius: 4px; max-height: 250px; object-fit: cover; margin-bottom: 15px;">`;
            }
            
            return `
                <div class="event-card" onclick="openEventModal(${event.id})" style="cursor: pointer;">
                    ${photoHtml}
                    <div class="event-title">${escapeHtml(event.title)}</div>
                    <div class="event-date">${formatDate(event.event_date)}</div>
                    <div class="event-description">${escapeHtml(event.description)}</div>
                </div>
            `;
        }
        
        /**
         * Load events from Supabase
         */
        async function loadEvents() {
            try {
                console.log('Loading events from Supabase...');
                
                // Use global supabase instance from credentials.js
                const supabaseClient = window.supabaseInstance || window.getSupabase();
                
                if (!supabaseClient) {
                    console.error('Supabase client not initialized');
                    throw new Error('Supabase client not available');
                }

                // Fetch events ordered by event_date ascending
                const { data: events, error } = await supabaseClient
                    .from('events')
                    .select('*')
                    .order('event_date', { ascending: true });

                if (error) {
                    console.error('Supabase error:', error);
                    throw error;
                }

                console.log('Events found:', events?.length || 0, events);
                
                // Store events for modal access
                allEvents = events || [];

                const content = document.getElementById('content');

                if (!events || events.length === 0) {
                    console.log('No events in Supabase');
                    content.innerHTML = `
                        <div style="grid-column: 1 / -1;">
                            <div class="empty-state">
                                <h2>No Events Yet</h2>
                                <p>Events posted from the dashboard will appear here</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                console.log('Creating event cards for', events.length, 'events');
                content.innerHTML = events.map(event => createEventCard(event)).join('');

            } catch (error) {
                console.error('Error loading events:', error);
                const content = document.getElementById('content');
                content.innerHTML = `
                    <div style="grid-column: 1 / -1;">
                        <div class="empty-state">
                            <h2>Error Loading Events</h2>
                            <p>${error.message}</p>
                            <a href="home.html" class="back-btn">Back to Home</a>
                        </div>
                    </div>
                `;
            }
        }
        
        /**
         * Open event modal with details
         */
        function openEventModal(eventId) {
            const event = allEvents.find(e => e.id === eventId);
            if (!event) {
                console.error('Event not found:', eventId);
                return;
            }
            
            console.log('Opening event modal:', event);
            document.getElementById('modalEventTitle').textContent = event.title;
            document.getElementById('modalEventDate').textContent = formatDate(event.event_date);
            document.getElementById('modalEventDescription').textContent = event.description;
            
            const photoImg = document.getElementById('modalEventPhoto');
            if (event.photo_url) {
                photoImg.src = event.photo_url;
                photoImg.style.display = 'block';
            } else {
                photoImg.style.display = 'none';
            }
            
            document.getElementById('eventModal').classList.add('open');
        }
        
        /**
         * Close event modal
         */
        function closeEventModal() {
            console.log('Closing event modal');
            document.getElementById('eventModal').classList.remove('open');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.addEventListener('load', loadEvents);
        
        /**
         * Close modal when clicking outside of it
         */
        document.getElementById('eventModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEventModal();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Cyber Sentinels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', 'JetBrains Mono', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========== NAVBAR ========== */
        nav {
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 2px solid #00ff41;
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #00ff41;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #00ff41 0%, #00d9ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000000;
            font-weight: bold;
            font-size: 20px;
        }

        .nav-menu {
            display: flex;
            gap: 25px;
            list-style: none;
            align-items: center;
        }

        .nav-menu a {
            color: #00ff41;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-menu a:hover {
            text-shadow: 0 0 15px rgba(0, 255, 65, 0.8);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: auto;
        }

        .nav-right a {
            color: #00ff41;
            text-decoration: none;
            font-size: 12px;
            padding: 8px 15px;
            border: 1px solid #00ff41;
            border-radius: 4px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .nav-right a:hover {
            background: #00ff41;
            color: #0a0e27;
        }

        /* ========== MAIN CONTENT ========== */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 36px;
            color: #00ff41;
            text-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
            margin-bottom: 10px;
        }

        .page-header p {
            color: #00ff41;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ========== LEADERBOARD TABLE ========== */
        .leaderboard-table {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00ff41;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(0, 255, 65, 0.1);
            color: #00ff41;
            padding: 16px;
            text-align: left;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            border-bottom: 2px solid #00ff41;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.2);
            transition: all 0.3s;
        }

        tr:hover td {
            background: rgba(0, 255, 65, 0.05);
        }

        /* Rank cells */
        .rank-cell {
            font-weight: bold;
            color: #00ff41;
            font-size: 18px;
            font-family: 'Courier New', monospace;
        }

        /* Medal for top 3 */
        tr:nth-child(1) .rank-cell::before {
            content: '🥇 ';
        }

        tr:nth-child(2) .rank-cell::before {
            content: '🥈 ';
        }

        tr:nth-child(3) .rank-cell::before {
            content: '🥉 ';
        }

        /* Name cells */
        .name-cell {
            color: #e0e0e0;
            font-weight: 500;
        }

        /* XP cells */
        .xp-cell {
            color: #00ff41;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            font-size: 16px;
        }

        /* Department cells */
        .dept-cell {
            color: #00884c;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #00ff41;
            font-size: 18px;
        }

        .error {
            background: rgba(255, 65, 65, 0.1);
            border: 1px solid #ff4141;
            color: #ff4141;
            padding: 20px;
            border-radius: 4px;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #00884c;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .pagination button,
        .pagination a {
            padding: 8px 12px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid #00ff41;
            color: #00ff41;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            text-decoration: none;
            font-size: 12px;
        }

        .pagination button:hover,
        .pagination a:hover {
            background: #00ff41;
            color: #0a0e27;
        }

        .pagination .active {
            background: #00ff41;
            color: #0a0e27;
        }

        .user-highlight {
            background: rgba(0, 255, 65, 0.1) !important;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-wrap: wrap;
            }

            .nav-menu {
                display: none;
            }

            .page-header h1 {
                font-size: 26px;
            }

            table {
                font-size: 13px;
            }

            th, td {
                padding: 12px;
            }

            .rank-cell {
                font-size: 16px;
            }

            .xp-cell {
                font-size: 14px;
            }

            .dept-cell {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- ========== NAVIGATION ========== -->
    <nav>
        <div class="nav-container">
            <div class="nav-left">
                <a href="home.html" class="logo-section">
                    <div class="logo-icon">⚔️</div>
                    <span>Cyber Sentinels</span>
                </a>
                <ul class="nav-menu">
                    <li><a href="home.html">Home</a></li>
                    <li><a href="events.html">Events</a></li>
                    <li><a href="leaderboard.html">Leaderboard</a></li>
                    <li><a href="resources.html">Resources</a></li>
                </ul>
            </div>
            <div class="nav-right">
                <a href="member-dashboard.html">📊 Dashboard</a>
                <a href="login.html">Login</a>
            </div>
        </div>
    </nav>

    <!-- ========== MAIN CONTENT ========== -->
    <div class="container">
        <!-- Header -->
        <div class="page-header">
            <h1>LEADERBOARD</h1>
            <p>━━ Top Cyber Sentinels ━━</p>
        </div>

        <!-- Leaderboard Table -->
        <div class="leaderboard-table">
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">Rank</th>
                        <th style="flex: 1;">Member Name</th>
                        <th style="width: 120px;">Department</th>
                        <th style="width: 100px;">XP</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr><td colspan="4" class="loading">Loading leaderboard...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="credentials.js"></script>
    <script>
        let allMembers = [];
        let currentUser = null;

        // ========== INITIALIZE ==========
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const supabase = window.getSupabase();
                if (!supabase) throw new Error('Supabase not initialized');

                // Get current user if logged in
                const { data: { user } } = await supabase.auth.getUser();
                currentUser = user;

                await loadLeaderboard();

            } catch (error) {
                console.error('❌ Initialization error:', error);
                showError('Error loading leaderboard');
            }
        });

        // ========== LOAD LEADERBOARD ==========
        async function loadLeaderboard() {
            const supabase = window.getSupabase();
            const tbody = document.getElementById('leaderboardBody');

            try {
                console.log('Loading leaderboard...');

                const { data: members, error } = await supabase
                    .from('profiles')
                    .select('id, full_name, email, department, year, xp, role')
                    .eq('role', 'member')
                    .order('xp', { ascending: false });

                if (error) throw error;

                if (!members || members.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state"><div class="empty-state-icon">🏆</div><p>No members yet. Be the first to join!</p></td></tr>';
                    return;
                }

                allMembers = members;
                console.log('✓ Leaderboard loaded:', members.length, 'members');

                // Render table
                tbody.innerHTML = members.map((member, index) => {
                    const isCurrentUser = currentUser && member.id === currentUser.id;
                    const rowClass = isCurrentUser ? 'user-highlight' : '';

                    return `
                        <tr class="${rowClass}">
                            <td class="rank-cell">#${index + 1}</td>
                            <td class="name-cell">${escapeHtml(member.full_name || 'Anonymous')}</td>
                            <td class="dept-cell">${escapeHtml(member.department || 'N/A')}</td>
                            <td class="xp-cell">${member.xp || 0}</td>
                        </tr>
                    `;
                }).join('');

            } catch (error) {
                console.error('❌ Leaderboard error:', error);
                tbody.innerHTML = `<tr><td colspan="4" class="error">Error loading leaderboard: ${error.message}</td></tr>`;
            }
        }

        // ========== UTILITIES ==========
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = `<tr><td colspan="4" class="error">${escapeHtml(message)}</td></tr>`;
        }
    </script>
</body>
</html>

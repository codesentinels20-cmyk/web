<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Member Registration - Cyber Sentinels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Courier New', 'JetBrains Mono', monospace;
            background: #0a0e27;
            color: #00ff41;
            position: relative;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 90%;
            max-width: 550px;
            padding: 40px;
            background: rgba(10, 14, 39, 0.98);
            border: 2px solid #00ff41;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
            border-radius: 8px;
            max-height: 85vh;
            overflow-y: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 22px;
            text-shadow: 0 0 10px #00ff41;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00ff41;
        }

        input, select, textarea {
            width: 100%;
            padding: 11px 12px;
            background: #1a1f3a;
            border: 1.5px solid #00ff41;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            transition: all 0.3s;
            line-height: 1.4;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.6);
            border-color: #00ff41;
            background: #0f1428;
        }

        input::placeholder {
            color: #005533;
        }

        /* Styled select dropdown */
        select {
            appearance: none;
            cursor: pointer;
            padding-right: 30px;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300ff41' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 18px;
            padding-right: 32px;
        }

        button {
            width: 100%;
            padding: 13px;
            background: #00ff41;
            color: #0a0e27;
            border: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 4px;
        }

        button:hover:not(:disabled) {
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.8);
            transform: scale(1.01);
            background: #00dd38;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            padding: 12px 14px;
            margin-top: 15px;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
            border: 1px solid;
            line-height: 1.5;
        }

        .success {
            background: rgba(0, 255, 65, 0.15);
            color: #00ff41;
            border-color: #00ff41;
        }

        .error {
            background: rgba(255, 0, 100, 0.15);
            color: #ff0064;
            border-color: #ff0064;
        }

        .info {
            background: rgba(0, 150, 255, 0.15);
            color: #0096ff;
            border-color: #0096ff;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .back-link a {
            color: #00ff41;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-link a:hover {
            text-shadow: 0 0 10px #00ff41;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .divider {
            text-align: center;
            margin: 20px 0 18px 0;
            font-size: 10px;
            color: #005533;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .divider::before,
        .divider::after {
            content: '────────';
            margin: 0 8px;
        }

        .verification-notice {
            background: rgba(0, 150, 255, 0.1);
            border: 1px solid #0096ff;
            border-radius: 4px;
            padding: 11px 13px;
            font-size: 11px;
            margin-bottom: 20px;
            color: #0096ff;
            line-height: 1.5;
        }

        small {
            color: #005533;
            display: block;
            margin-top: 4px;
            font-size: 10px;
        }

        /* Hide scrollbar while keeping functionality */
        .container::-webkit-scrollbar {
            display: none;
        }

        .container {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
                width: 95%;
                max-height: 90vh;
                border-radius: 6px;
            }

            h1 {
                font-size: 18px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            input, select {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="container">
        <h1>> MEMBER_REGISTRATION</h1>

        <div class="verification-notice">
            📧 A verification email will be sent to your email address after registration. You must verify your email before logging in.
        </div>

        <form id="registrationForm" onsubmit="handleMemberRegistration(event)">
            <div class="form-group">
                <label for="fullName">FULL NAME *</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">EMAIL ADDRESS *</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="department">DEPARTMENT *</label>
                    <select id="department" required>
                        <option value="">Select</option>
                        <option value="CSE">Computer Science</option>
                        <option value="ECE">Electronics</option>
                        <option value="EEE">Electrical</option>
                        <option value="MECH">Mechanical</option>
                        <option value="CIVIL">Civil</option>
                        <option value="BIO">Biomedical</option>
                        <option value="IT">Information Tech</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="year">YEAR *</label>
                    <select id="year" required>
                        <option value="">Select</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="registerNo">REGISTER NUMBER *</label>
                <input type="text" id="registerNo" placeholder="E.g.: NEC22CS001" required>
            </div>

            <div class="form-group">
                <label for="phone">PHONE NUMBER *</label>
                <input type="tel" id="phone" placeholder="Enter your phone number" required>
            </div>

            <div class="divider">PASSWORD</div>

            <div class="form-group">
                <label for="password">PASSWORD *</label>
                <input type="password" id="password" placeholder="Min 8 chars" required>
                <small>Minimum 8 characters, include uppercase & number</small>
            </div>

            <div class="form-group">
                <label for="confirmPassword">CONFIRM PASSWORD *</label>
                <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
            </div>

            <button type="submit" id="registerBtn">REGISTER AS MEMBER</button>
        </form>

        <div id="registrationMessage"></div>

        <div class="back-link">
            <a href="home.html">← Back to Home</a> | <a href="login.html">Already a Member? Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="credentials.js"></script>
    <script>
        // ========== Matrix Rain Effect ==========
        function initMatrixRain() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
            const fontSize = 16;
            const columns = Math.floor(canvas.width / fontSize);
            const drops = Array(columns).fill(0);

            function drawMatrix() {
                ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff41';
                ctx.font = fontSize + 'px Courier New';
                for (let i = 0; i < drops.length; i++) {
                    const char = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(char, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }

            setInterval(drawMatrix, 50);

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // ========== Initialize ==========
        document.addEventListener('DOMContentLoaded', function() {
            initMatrixRain();
            checkAuthStatus();
        });

        // ========== Check if already logged in ==========
        async function checkAuthStatus() {
            const supabase = window.getSupabase();
            if (supabase) {
                const { data: { user } } = await supabase.auth.getUser();
                if (user) {
                    window.location.href = 'member-dashboard.html';
                }
            }
        }

        // ========== Validate Password Strength ==========
        function validatePasswordStrength(password) {
            const minLength = password.length >= 8;
            const hasUppercase = /[A-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);

            return minLength && hasUppercase && hasNumber;
        }

        // ========== Handle Member Registration ==========
        async function handleMemberRegistration(e) {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const department = document.getElementById('department').value;
            const year = document.getElementById('year').value;
            const registerNo = document.getElementById('registerNo').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const registerBtn = document.getElementById('registerBtn');
            const messageDiv = document.getElementById('registrationMessage');

            // Validation
            if (!fullName || !email || !department || !year || !registerNo || !phone || !password) {
                messageDiv.innerHTML = '<div class="message error">❌ All fields are required.</div>';
                return;
            }

            if (password !== confirmPassword) {
                messageDiv.innerHTML = '<div class="message error">❌ Passwords do not match!</div>';
                return;
            }

            if (!validatePasswordStrength(password)) {
                messageDiv.innerHTML = '<div class="message error">❌ Password must have 8+ characters, uppercase letter, and number.</div>';
                return;
            }

            if (!/^\d{10}$/.test(phone.replace(/\D/g, ''))) {
                messageDiv.innerHTML = '<div class="message error">❌ Invalid phone number.</div>';
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Registering...';
            messageDiv.innerHTML = '';

            try {
                const supabase = window.getSupabase();
                if (!supabase) throw new Error('Supabase not initialized');

                console.log(' [MEMBER REGISTRATION] Starting registration for:', email);

                // Sign up with Supabase Auth
                // The redirect URL will be handled by Supabase
                const redirectUrl = `${window.location.origin}/verify-email.html`;
                
                const { data: { user }, error: signUpError } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        emailRedirectTo: redirectUrl,
                        data: {
                            full_name: fullName,
                            department: department,
                            year: year,
                            register_no: registerNo,
                            phone: phone
                        }
                    }
                });

                if (signUpError) {
                    console.error('❌ SignUp error:', signUpError);
                    throw new Error(signUpError.message || 'Registration failed');
                }

                console.log('✓ Supabase Auth user created:', user?.id);

                // Show success message
                messageDiv.innerHTML = `<div class="message success">
                    ✅ Registration successful!<br><br>
                    A verification email has been sent to <strong>${email}</strong>.<br>
                    Click the verification link in your email to complete registration.<br><br>
                    <small>Check your spam folder if you don't see the email.</small>
                </div>`;

                // Reset form
                document.getElementById('registrationForm').reset();

                // Redirect after delay
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 4000);

            } catch (error) {
                console.error('❌ Registration error:', error);
                messageDiv.innerHTML = `<div class="message error">Error: ${error.message}</div>`;
                registerBtn.disabled = false;
                registerBtn.textContent = 'Register as Member';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources - Cyber Sentinels (KEC)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        nav {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid #00ff41;
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-size: 24px;
            font-weight: bold;
            color: #00ff41;
            letter-spacing: 1px;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-menu a {
            color: #e0e0e0;
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
        }

        .nav-menu a:hover {
            color: #00ff41;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-header h1 {
            font-size: 48px;
            color: #00ff41;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .page-header p {
            font-size: 16px;
            color: #00d9ff;
        }

        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .resource-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 8px;
            padding: 25px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 255, 65, 0.1);
            transition: all 0.3s;
        }

        .resource-card:hover {
            border-color: #00ff41;
            box-shadow: 0 8px 32px rgba(0, 255, 65, 0.3);
            transform: translateY(-5px);
        }

        .resource-name {
            font-size: 20px;
            color: #00ff41;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .resource-type {
            display: inline-block;
            background: rgba(0, 217, 255, 0.2);
            color: #00d9ff;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .resource-description {
            color: #b0b0b0;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #00ff41, #00d9ff);
            color: #0a0a0a;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .download-btn:hover {
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            transform: translateY(-2px);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state h2 {
            font-size: 28px;
            color: #00ff41;
            margin-bottom: 15px;
        }

        .empty-state p {
            color: #b0b0b0;
            font-size: 16px;
        }

        .loading {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .spinner {
            border: 3px solid rgba(0, 255, 65, 0.3);
            border-top: 3px solid #00ff41;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .resources-grid {
                grid-template-columns: 1fr;
            }

            .page-header h1 {
                font-size: 32px;
            }

            .nav-menu {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-brand">⚔️ CYBER SENTINELS</div>
            <ul class="nav-menu">
                <li><a href="home.html">Home</a></li>
                <li><a href="team.html">Team</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📚 Learning Resources</h1>
            <p>Curated security materials and learning resources</p>
        </div>

        <div id="content" class="resources-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading resources...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="credentials.js"></script>
    <script>
        // Helper to get Supabase instance with fallback
        function getSupabase() {
            if (window.supabaseInstance) return window.supabaseInstance;
            if (window.getSupabase) return window.getSupabase();
            throw new Error('Supabase not initialized');
        }

        /**
         * Create resource card HTML
         */
        function createResourceCard(resource) {
            return `
                <div class="resource-card">
                    <div class="resource-name">${escapeHtml(resource.name)}</div>
                    <div class="resource-description">${escapeHtml(resource.description)}</div>
                    <button class="download-btn" data-url="${resource.file_url}" data-name="${escapeHtml(resource.name)}">⬇️ Download File</button>
                </div>
            `;
        }

        /**
         * Attach download handlers to buttons
         */
        function attachDownloadHandlers() {
            const downloadButtons = document.querySelectorAll('.download-btn');
            downloadButtons.forEach(button => {
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    const url = this.getAttribute('data-url');
                    const name = this.getAttribute('data-name');
                    downloadResource(url, name);
                });
            });
        }

        /**
         * Download file from Supabase storage
         * Fetches as blob and triggers browser download
         * @param {string} fileUrl - Full Supabase file URL
         * @param {string} fileName - Name to save file as
         */
        async function downloadResource(fileUrl, fileName) {
            try {
                console.log('=== DOWNLOADING RESOURCE ===');
                console.log('File URL:', fileUrl);
                console.log('File Name:', fileName);

                // Fetch the file as a blob
                const response = await fetch(fileUrl);
                
                if (!response.ok) {
                    throw new Error(`Failed to fetch file: ${response.statusText}`);
                }

                const blob = await response.blob();
                console.log('✓ File fetched successfully, size:', blob.size, 'bytes');

                // Create a temporary blob URL
                const blobUrl = URL.createObjectURL(blob);
                console.log('✓ Blob URL created');

                // Create a temporary anchor element and trigger download
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // Clean up the blob URL after a short delay
                setTimeout(() => {
                    URL.revokeObjectURL(blobUrl);
                    console.log('✓ Blob URL cleaned up');
                }, 100);

                console.log('✓ Download triggered successfully');

            } catch (error) {
                console.error('❌ Error downloading resource:', error);
                alert(`Failed to download resource: ${error.message}`);
            }
        }

        /**
         * Escape HTML to prevent XSS
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /**
         * Load resources from Supabase
         */
        async function loadResources() {
            try {
                console.log('=== LOADING RESOURCES FROM SUPABASE ===');
                const sbInstance = getSupabase();
                const contentEl = document.getElementById('content');
                
                // Fetch all resources from Supabase
                const { data: resources, error } = await sbInstance
                    .from('resources')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    throw new Error(error.message);
                }

                console.log('✓ Resources loaded from Supabase:', resources);
                console.log('Total resources:', resources?.length || 0);

                if (!resources || resources.length === 0) {
                    console.log('No resources available');
                    contentEl.innerHTML = `
                        <div class="empty-state">
                            <h2>No Resources Available</h2>
                            <p>Resources will be shared here by the team</p>
                        </div>
                    `;
                    return;
                }

                console.log('Creating resource cards for', resources.length, 'resources');
                contentEl.innerHTML = resources.map(resource => createResourceCard(resource)).join('');
                
                // Attach download button handlers
                attachDownloadHandlers();
                console.log('??? Download handlers attached');
                

            } catch (error) {
                console.error('❌ Error loading resources:', error);
                const contentEl = document.getElementById('content');
                contentEl.innerHTML = `
                    <div class="empty-state">
                        <h2>Error Loading Resources</h2>
                        <p>${escapeHtml(error.message)}</p>
                    </div>
                `;
            }
        }

        /* ============================================
           INITIALIZATION
           ============================================ */
        window.addEventListener('load', () => {
            console.log('=== RESOURCES PAGE LOADED ===');
            loadResources();
        });
    </script>
</body>
</html>
